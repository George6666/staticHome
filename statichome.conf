server {
    listen 80;
    server_name _;

    # 这里改成服务器上实际存放本仓库静态文件的目录。
    root /var/www/staticHome;
    index index.html;

    # 静态资源设置缓存，文件不存在时直接返回 404。
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # 访问根路径时，可以展示根目录首页；没有首页就返回 404。
    location = / {
        try_files /index.html =404;
    }

    # 根目录下的普通静态文件直接访问，文件不存在时返回 404。
    location / {
        try_files $uri $uri/ =404;
    }

    # 任意一级路径都会映射到同名文件夹。
    # /gift-box/ -> /var/www/softbuild/gift-box/index.html
    # /gift-box/detail.html -> /var/www/softbuild/gift-box/detail.html
    location ~ ^/([^/]+)/(.*)$ {
        try_files $uri $uri/ /$1/index.html =404;
    }

    # /gift-box 这种不带结尾斜杠的地址跳转到 /gift-box/。
    location ~ ^/([^/.]+)$ {
        return 301 /$1/;
    }
}
